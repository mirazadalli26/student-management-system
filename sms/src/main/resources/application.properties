# ===============================
# Application
# ===============================
spring.application.name=student-management-system
server.port=8080

# ===============================
# Datasource (PostgreSQL)
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/sms
spring.datasource.username=postgres
spring.datasource.password=123
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ===============================
# Default Administrator provisioning (R1)
# ===============================
sms.admin.username=admin
sms.admin.password=password

# ===============================
# JWT configuration
# ===============================
# Base64-encoded 256-bit secret; override in production.
sms.jwt.secret=Y2hhbmdlLXRoaXMtc2VjcmV0LWtleS10by1hLXNlY3VyZS0yNTYtYml0LXZhbHVl
sms.jwt.expiration-seconds=900

# ===============================
# Static content
# ===============================
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**