# ===============================
# Dev profile — in-memory H2 database (no external DB required)
# Activate with: ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev
# or run the jar with: --spring.profiles.active=dev
# ===============================

# H2 in MySQL-compatibility mode. Data lives only in memory and is reset on
# every restart, so the DataInitializer re-creates the default admin each run.
spring.datasource.url=jdbc:h2:mem:sms;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Let Hibernate build the schema for the in-memory DB and use the H2 dialect
# (overrides the MySQLDialect set in the base application.properties).
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
